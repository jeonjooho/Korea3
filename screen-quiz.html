<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quiz & Video Screen</title>
<style>
*{box-sizing:border-box} body{margin:0;width:100vw;height:100dvh;overflow:hidden;font-family:Arial,sans-serif;background:#eaf5ff;color:#102044}
.bgLayer{position:fixed;inset:0;z-index:-2;background-size:cover;background-position:center;background-repeat:no-repeat;opacity:0}
#screenMainTitleArea,#screenSubtitleArea{position:fixed;text-align:center;z-index:2;overflow:hidden;display:flex;align-items:center;justify-content:center;white-space:normal;line-height:1.2;word-break:keep-all;overflow-wrap:anywhere;padding:8px 14px}
#screenTitle{margin:0;width:100%}
#screenSubtitle{margin:0;width:100%}
#fullscreenBtn{position:fixed;right:18px;bottom:18px;z-index:20;border:0;border-radius:12px;padding:12px 16px;background:#17335f;color:white;font-weight:900;cursor:pointer}
#videoOverlay{display:none;position:fixed;inset:0;z-index:80;background:#000;opacity:1} #videoOverlay video,#videoOverlay iframe{width:100vw;height:100dvh;border:0;object-fit:contain} #closeVideo{position:fixed;right:18px;top:18px;z-index:81;border:0;border-radius:12px;padding:10px 14px;background:#ffffffcc;color:#17335f;font-weight:900;cursor:pointer}
#localVideoPicker,#localVideoPicker2{position:fixed;left:18px;z-index:30;background:#ffffffe8;border:1px solid #ccc;border-radius:12px;padding:10px;max-width:340px;font-size:13px}
#localVideoPicker{bottom:18px}
#localVideoPicker2{bottom:118px}
</style></head><body>
<div id="bgLayerA" class="bgLayer"></div>
<div id="bgLayerB" class="bgLayer"></div>
<div id="screenMainTitleArea"><h1 id="screenTitle"></h1></div>
<div id="screenSubtitleArea"><p id="screenSubtitle"></p></div>
<button id="fullscreenBtn">Full Screen</button>
<div id="localVideoPicker"><b>이 스크린 컴퓨터의 로컬 영상 (영상 1)</b><br><input id="localVideoFile" type="file" accept="video/*"><div id="localVideoStatus">로컬 영상을 선택한 뒤 start-quiz.html에서 LOCAL을 사용하세요.</div></div>
<div id="localVideoPicker2"><b>이 스크린 컴퓨터의 로컬 영상 (영상 2)</b><br><input id="localVideoFile2" type="file" accept="video/*"><div id="localVideoStatus2">로컬 영상을 선택한 뒤 start-quiz.html에서 LOCAL을 사용하세요.</div></div>
<div id="videoOverlay"><button id="closeVideo">닫기</button><video id="videoPlayer" controls playsinline preload="auto"></video><iframe id="videoFrame" style="display:none"></iframe></div>
<video id="videoPreload1" style="display:none" preload="none"></video>
<video id="videoPreload2" style="display:none" preload="none"></video>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="firebase-config-quiz.js"></script>
<script>
/* Quiz + Video display screen. Independent Firebase path
   "quizVideoBook/..." — separate from the message set's "visitorBook/...".
   Idle state shows a title/subtitle + background. When input-quiz.html
   sends an action it either plays a video overlay here, or opens the
   quiz website in a new popup window. */
const DEFAULT_SETTINGS = {"screenTitle": "Quiz & Video Zone", "screenSubtitle": "Scan, watch, and play — enjoy the booth!", "screenTitleFont": "Arial", "screenTitleSize": 54, "screenTitleColor": "#08377d", "screenTitleWeight":"800", "screenTitleAreaX":3,"screenTitleAreaY":24,"screenTitleAreaWidth":94,"screenTitleAreaHeight":78,"screenTitleAreaBgColor":"rgba(255,255,255,0)","screenTitleAreaBgImage":"","screenTitleAreaDottedBorder":"no","screenTitleAreaBorderColor":"#8cb0dd","screenTitleAreaBorderRadius":0, "screenSubtitleFont": "Arial", "screenSubtitleSize": 26, "screenSubtitleColor": "#142855","screenSubtitleWeight":"400","screenSubtitleAreaX":3,"screenSubtitleAreaY":108,"screenSubtitleAreaWidth":94,"screenSubtitleAreaHeight":54,"screenSubtitleAreaBgColor":"rgba(255,255,255,0)","screenSubtitleAreaBgImage":"","screenSubtitleAreaDottedBorder":"no","screenSubtitleAreaBorderColor":"#8cb0dd","screenSubtitleAreaBorderRadius":0, "screenBgColor": "#eaf5ff", "screenBgImages": "", "screenBgInterval": 10, "screenBgFadeDuration":1.5, "screenBgFadeInDuration":1.5, "videoUrl": "", "preloadVideo": "yes", "localVideoEnabled": "yes", "videoUrl2": "", "preloadVideo2": "yes", "localVideoEnabled2": "yes", "videoFadeInDuration": 0.8, "videoFadeOutDuration": 0.8, "videoAutoplayEnabled": "no", "videoAutoplayIntervalMin": 30, "video2AutoplayEnabled": "no", "video2AutoplayIntervalMin": 30, "videoSequentialAutoplayEnabled": "no", "videoSequentialAutoplayIntervalMin": 30, "quizWebsiteUrl": ""};
function mergedSettings(s){ return Object.assign({}, DEFAULT_SETTINGS, s || {}); }
function safeCssUrl(url){ url=String(url||'').trim(); return url ? `url("${url.replace(/"/g, '%22')}")` : 'none'; }
function bgStyle(color, image){ return image ? `${color} ${safeCssUrl(image)} center/cover no-repeat` : color; }
function normalizeUrl(url){ url=String(url||'').trim(); if(!url)return ''; if(!/^https?:\/\//i.test(url) && !url.startsWith('LOCAL')) url='https://'+url; return url; }

if(typeof db==='undefined'){document.body.insertAdjacentHTML('afterbegin','<div style="position:fixed;inset:0;z-index:9999;background:white;color:#b91c1c;padding:30px;font:20px Arial">Firebase is not initialized. Please check firebase-config-quiz.js.</div>'); throw new Error('Firebase db is not defined');}
const settingsRef=db.ref('quizVideoBook/settings'), actionRef=db.ref('quizVideoBook/screenAction');
let settings=mergedSettings(), bgTimer=null, bgIndex=0, bgActiveLayer='A', selectedLocalVideoUrl='', selectedLocalVideoUrl2='';
let videoAutoTimer1=null, videoAutoTimer2=null, videoSeqTimer=null, closingVideoTimer=null;

function el(id){return document.getElementById(id);}
const screenMainTitleArea=el('screenMainTitleArea'), screenTitle=el('screenTitle'), screenSubtitleArea=el('screenSubtitleArea'), screenSubtitle=el('screenSubtitle');
const videoOverlay=el('videoOverlay'), videoPlayer=el('videoPlayer'), videoFrame=el('videoFrame'), closeVideo=el('closeVideo');
const videoPreload1=el('videoPreload1'), videoPreload2=el('videoPreload2');
const localVideoPicker=el('localVideoPicker'), localVideoPicker2=el('localVideoPicker2');

function applyTitleBox(elBox, textEl, prefix, textValue, fallback){
  const x=Number(settings[prefix+'AreaX'] ?? fallback.x);
  const y=Number(settings[prefix+'AreaY'] ?? fallback.y);
  const w=Number(settings[prefix+'AreaWidth'] ?? fallback.w);
  const h=Number(settings[prefix+'AreaHeight'] ?? fallback.h);
  elBox.style.left=x+'vw';
  elBox.style.top=y+'px';
  elBox.style.width=w+'vw';
  elBox.style.height=h+'px';
  elBox.style.background=bgStyle(settings[prefix+'AreaBgColor']||'rgba(255,255,255,0)', settings[prefix+'AreaBgImage']||'');
  elBox.style.backgroundSize='cover';
  elBox.style.backgroundPosition='center';
  elBox.style.border=(settings[prefix+'AreaDottedBorder']==='yes')?`2px dashed ${settings[prefix+'AreaBorderColor']||'#8cb0dd'}`:'0';
  elBox.style.borderRadius=(Number(settings[prefix+'AreaBorderRadius']||0)||0)+'px';
  textEl.textContent=String(textValue||'');
  textEl.style.fontFamily=settings[prefix+'Font']||'Arial';
  textEl.style.fontSize=(Number(settings[prefix+'Size']||fallback.size)||fallback.size)+'px';
  textEl.style.fontWeight=String(settings[prefix+'Weight']||fallback.weight);
  textEl.style.color=settings[prefix+'Color']||fallback.color;
}
function applyScreenTitleAreas(){
  applyTitleBox(screenMainTitleArea, screenTitle, 'screenTitle', settings.screenTitle, {x:3,y:24,w:94,h:78,size:54,weight:'800',color:'#08377d'});
  applyTitleBox(screenSubtitleArea, screenSubtitle, 'screenSubtitle', settings.screenSubtitle, {x:3,y:108,w:94,h:54,size:26,weight:'400',color:'#142855'});
}
function applySettings(){
  document.body.style.background=settings.screenBgColor;
  const imgs=String(settings.screenBgImages||'').split(/\n|,/).map(x=>x.trim()).filter(Boolean);
  if(bgTimer)clearInterval(bgTimer);
  const layerA=el('bgLayerA'), layerB=el('bgLayerB');
  if(imgs.length){
    const fadeOutSec=Math.max(0,Number(settings.screenBgFadeDuration ?? 1.5));
    const fadeInSec=Math.max(0,Number(settings.screenBgFadeInDuration ?? fadeOutSec));
    function setBg(){
      const url=imgs[bgIndex%imgs.length]; bgIndex++;
      const nextLayer=bgActiveLayer==='A'?layerB:layerA, curLayer=bgActiveLayer==='A'?layerA:layerB;
      if(!url)return;
      nextLayer.style.transition=`opacity ${fadeInSec}s ease`;
      curLayer.style.transition=`opacity ${fadeOutSec}s ease`;
      nextLayer.style.backgroundImage=`url("${url}")`;
      nextLayer.style.opacity='1';
      curLayer.style.opacity='0';
      bgActiveLayer=bgActiveLayer==='A'?'B':'A';
    }
    setBg();
    bgTimer=setInterval(setBg,Math.max(1,Number(settings.screenBgInterval||10))*1000);
  } else {
    layerA.style.opacity='0'; layerB.style.opacity='0';
  }
  applyScreenTitleAreas();
  localVideoPicker.style.display=settings.localVideoEnabled==='no'?'none':'block';
  localVideoPicker2.style.display=settings.localVideoEnabled2==='no'?'none':'block';
}
settingsRef.on('value',snap=>{settings=mergedSettings(snap.val());applySettings();preloadAll();setupVideoAutoplay();});

function embedUrl(url){
  url=String(url||'').trim();
  let m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([\w-]{6,})/);
  if(m) return `https://www.youtube.com/embed/${m[1]}?autoplay=1&rel=0`;
  m=url.match(/vimeo\.com\/(\d+)/);
  if(m) return `https://player.vimeo.com/video/${m[1]}?autoplay=1`;
  return '';
}
function isDirectPlayable(url){url=String(url||'').trim(); return url.toUpperCase()==='LOCAL' || (!!url && !embedUrl(url));}
function openVideo(url,slot,onEndedOverride){
  slot=String(slot||'1');
  url=String(url||'').trim();
  if(url.toUpperCase()==='LOCAL')url=(slot==='2'?selectedLocalVideoUrl2:selectedLocalVideoUrl);
  if(!url){alert('영상 URL 또는 로컬 영상이 선택되지 않았습니다.');return}
  if(closingVideoTimer){clearTimeout(closingVideoTimer);closingVideoTimer=null;}
  const fadeInMs=Math.max(0,Number(settings.videoFadeInDuration ?? 0.8))*1000;
  videoPlayer.onended=null;
  if(fadeInMs>0){
    videoOverlay.style.transition='none';
    videoOverlay.style.opacity='0';
    videoOverlay.style.display='block';
    void videoOverlay.offsetWidth;
    videoOverlay.style.transition=`opacity ${fadeInMs}ms ease`;
    videoOverlay.style.opacity='1';
  } else {
    videoOverlay.style.transition='none';
    videoOverlay.style.opacity='1';
    videoOverlay.style.display='block';
  }
  const emb=embedUrl(url);
  if(emb){
    videoPlayer.style.display='none';videoFrame.style.display='block';videoFrame.src=emb;
  } else {
    videoFrame.style.display='none';videoPlayer.style.display='block';videoPlayer.src=url;videoPlayer.play().catch(()=>{});
    videoPlayer.onended=onEndedOverride||(()=>{videoPlayer.onended=null;closeVid();});
  }
}
function closeVid(){
  videoPlayer.onended=null;
  if(closingVideoTimer){clearTimeout(closingVideoTimer);closingVideoTimer=null;}
  const fadeOutMs=Math.max(0,Number(settings.videoFadeOutDuration ?? 0.8))*1000;
  function finishClose(){
    videoOverlay.style.display='none';
    videoOverlay.style.transition='none';
    videoOverlay.style.opacity='1';
    videoPlayer.pause();
    videoPlayer.removeAttribute('src');
    videoFrame.removeAttribute('src');
    closingVideoTimer=null;
  }
  if(fadeOutMs<=0){finishClose();return;}
  videoOverlay.style.transition=`opacity ${fadeOutMs}ms ease`;
  videoOverlay.style.opacity='0';
  closingVideoTimer=setTimeout(finishClose,fadeOutMs);
}
closeVideo.onclick=closeVid;
function preloadOne(url,videoEl){
  url=String(url||'').trim();
  if(url && isDirectPlayable(url) && url.toUpperCase()!=='LOCAL'){videoEl.preload='auto';videoEl.src=url;videoEl.load();}
}
function preloadAll(){
  if(settings.preloadVideo==='yes')preloadOne(settings.videoUrl,videoPreload1);
  if(settings.preloadVideo2==='yes')preloadOne(settings.videoUrl2,videoPreload2);
}
function playSequential(){
  const url1=String(settings.videoUrl||'').trim();
  const url2=String(settings.videoUrl2||'').trim();
  openVideo(url1,'1', isDirectPlayable(url1)?(()=>{
    videoPlayer.onended=null;
    openVideo(url2,'2');
  }):undefined);
}
function isIdle(){return videoOverlay.style.display!=='block';}
function setupVideoAutoplay(){
  if(videoAutoTimer1){clearInterval(videoAutoTimer1);videoAutoTimer1=null;}
  if(videoAutoTimer2){clearInterval(videoAutoTimer2);videoAutoTimer2=null;}
  if(videoSeqTimer){clearInterval(videoSeqTimer);videoSeqTimer=null;}
  if(settings.videoSequentialAutoplayEnabled==='yes'){
    const ms=Math.max(1,Number(settings.videoSequentialAutoplayIntervalMin||30))*60000;
    videoSeqTimer=setInterval(()=>{if(isIdle())playSequential();},ms);
    return;
  }
  if(settings.videoAutoplayEnabled==='yes'){
    const ms=Math.max(1,Number(settings.videoAutoplayIntervalMin||30))*60000;
    videoAutoTimer1=setInterval(()=>{if(isIdle())openVideo(settings.videoUrl,'1');},ms);
  }
  if(settings.video2AutoplayEnabled==='yes'){
    const ms=Math.max(1,Number(settings.video2AutoplayIntervalMin||30))*60000;
    videoAutoTimer2=setInterval(()=>{if(isIdle())openVideo(settings.videoUrl2,'2');},ms);
  }
}

let lastActionCreatedAt=0, actionListenerReady=false;
actionRef.on('value',snap=>{
  const a=snap.val();
  if(!a||!a.type)return;
  if(!actionListenerReady){actionListenerReady=true; if(a.createdAt)lastActionCreatedAt=a.createdAt; return;}
  if(a.createdAt&&a.createdAt===lastActionCreatedAt)return;
  if(a.createdAt)lastActionCreatedAt=a.createdAt;
  if(a.type==='open-video-window')openVideo(a.url,a.slot);
  if(a.type==='open-quiz-window'){
    const u=normalizeUrl(a.url||settings.quizWebsiteUrl);
    if(u){
      const w=window.open(u,'_blank','noopener,noreferrer,popup=yes,width='+window.screen.availWidth+',height='+window.screen.availHeight+',left=0,top=0');
      if(!w){console.warn('Quiz popup was blocked. Please allow popups for this screen page.');}
    }
  }
});

el('localVideoFile').addEventListener('change',e=>{
  const f=e.target.files&&e.target.files[0];
  if(!f)return;
  if(selectedLocalVideoUrl)URL.revokeObjectURL(selectedLocalVideoUrl);
  selectedLocalVideoUrl=URL.createObjectURL(f);
  el('localVideoStatus').textContent='로컬 영상 선택됨: '+f.name;
});
el('localVideoFile2').addEventListener('change',e=>{
  const f=e.target.files&&e.target.files[0];
  if(!f)return;
  if(selectedLocalVideoUrl2)URL.revokeObjectURL(selectedLocalVideoUrl2);
  selectedLocalVideoUrl2=URL.createObjectURL(f);
  el('localVideoStatus2').textContent='로컬 영상 선택됨: '+f.name;
});

el('fullscreenBtn').onclick=async()=>{try{if(!document.fullscreenElement)await document.documentElement.requestFullscreen(); else await document.exitFullscreen();}catch(e){alert('이 브라우저에서는 Full Screen 모드를 사용할 수 없습니다.');}};
document.addEventListener('fullscreenchange',()=>{el('fullscreenBtn').textContent=document.fullscreenElement?'Exit Full Screen':'Full Screen';});
</script></body></html>
