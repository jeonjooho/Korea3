<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quiz & Video Zone</title>
<style>
*{box-sizing:border-box} body{margin:0;min-height:100dvh;font-family:Arial,sans-serif;display:grid;place-items:center;color:#10234a}
.launchBox{position:relative;width:min(92vw,var(--box-w,680px));min-height:420px;border-radius:28px;padding:34px;box-shadow:0 12px 44px #7692b344;text-align:center;overflow:hidden}
h1{margin:0 0 10px} .note{line-height:1.5;color:#51617f;margin:0 0 24px}
.btnArea{position:relative;height:220px;margin-top:10px}
.launchBtn{position:absolute;display:grid;place-items:center;text-decoration:none;font-weight:900;border:0;border-radius:16px;padding:8px;cursor:pointer;box-shadow:0 8px 20px rgba(20,40,80,.18)}
</style></head><body>
<main class="launchBox" id="launchBox">
  <h1 id="indexTitle"></h1>
  <p class="note" id="indexSubtitle"></p>
  <div class="btnArea">
    <button type="button" class="launchBtn" id="adminBtn"></button>
    <a class="launchBtn" id="inputBtn" href="input-quiz.html" target="_blank"></a>
    <a class="launchBtn" id="screenBtn" href="screen-quiz.html" target="_blank"></a>
  </div>
</main>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
/* This is a fully independent app: it uses its OWN Firebase path
   "quizVideoBook/settings" (separate from "visitorBook/..."), so it
   never collides with the message set's admin password or styling. */
const DEFAULT_SETTINGS = {"adminPassword": "1234", "indexTitle": "Quiz & Video Zone", "indexTitleFont": "Arial", "indexTitleSize": 36, "indexTitleColor": "#0b4fd7", "indexSubtitle": "Play the quiz or watch a video", "indexBgColor": "#eaf4ff", "indexBgImage": "", "indexBoxColor": "#ffffff", "indexBoxImage": "", "indexBoxWidth": 680, "indexBoxTop": 0, "adminBtnText": "Admin / Start", "inputBtnText": "Open Input Screen", "screenBtnText": "Open Screen Display", "adminBtnX": 0, "adminBtnY": 0, "adminBtnWidth": 100, "adminBtnHeight": 60, "adminBtnColor": "#0b4fd7", "adminBtnImage": "", "adminBtnFont": "Arial", "adminBtnFontSize": 22, "adminBtnTextColor": "#ffffff", "inputBtnX": 0, "inputBtnY": 80, "inputBtnWidth": 100, "inputBtnHeight": 60, "inputBtnColor": "#7c3aed", "inputBtnImage": "", "inputBtnFont": "Arial", "inputBtnFontSize": 22, "inputBtnTextColor": "#ffffff", "screenBtnX": 0, "screenBtnY": 160, "screenBtnWidth": 100, "screenBtnHeight": 60, "screenBtnColor": "#209147", "screenBtnImage": "", "screenBtnFont": "Arial", "screenBtnFontSize": 22, "screenBtnTextColor": "#ffffff"};
function mergedSettings(s){ return Object.assign({}, DEFAULT_SETTINGS, s || {}); }
function safeCssUrl(url){ url=String(url||'').trim(); return url ? `url("${url.replace(/"/g, '%22')}")` : 'none'; }
function bgStyle(color, image){ return image ? `${color} ${safeCssUrl(image)} center/cover no-repeat` : color; }

if(typeof db==='undefined'){document.body.insertAdjacentHTML('afterbegin','<div style="position:fixed;top:0;left:0;right:0;z-index:9999;background:#fff3f3;color:#b91c1c;padding:18px;font-weight:800">Firebase가 초기화되지 않았습니다. firebase-config.js를 확인하세요.</div>'); throw new Error('Firebase db is not defined');}
const settingsRef = db.ref('quizVideoBook/settings');
function apply(s){
  s=mergedSettings(s);
  document.body.style.background=bgStyle(s.indexBgColor,s.indexBgImage);
  launchBox.style.setProperty('--box-w',s.indexBoxWidth+'px');
  launchBox.style.background=bgStyle(s.indexBoxColor,s.indexBoxImage);
  launchBox.style.transform=`translateY(${Number(s.indexBoxTop||0)}px)`;
  indexTitle.textContent=s.indexTitle; indexTitle.style.fontFamily=s.indexTitleFont; indexTitle.style.fontSize=s.indexTitleSize+'px'; indexTitle.style.color=s.indexTitleColor;
  indexSubtitle.textContent=s.indexSubtitle;
  const map={adminBtn:['admin',s.adminBtnText],inputBtn:['input',s.inputBtnText],screenBtn:['screen',s.screenBtnText]};
  let fallbackY = {adminBtn:0, inputBtn:80, screenBtn:160};
  for(const id in map){
    const [key,text]=map[id], el=document.getElementById(id); el.textContent=text;
    const yValue = Number(s[key+'BtnY']);
    el.style.left=(s[key+'BtnX'] ?? 0)+'%';
    el.style.top=(Number.isFinite(yValue) ? yValue : fallbackY[id])+'px';
    el.style.width=(s[key+'BtnWidth'] || 100)+'%';
    el.style.height=(s[key+'BtnHeight'] || 60)+'px';
    el.style.background=bgStyle(s[key+'BtnColor'],s[key+'BtnImage']);
    el.style.fontFamily=s[key+'BtnFont'];
    el.style.fontSize=s[key+'BtnFontSize']+'px';
    el.style.color=s[key+'BtnTextColor'];
  }
}
settingsRef.on('value',snap=>{window.currentSettings=mergedSettings(snap.val());apply(window.currentSettings);});
adminBtn.onclick=()=>{ const pw=prompt('관리자 비밀번호를 입력하세요.'); const saved=String((window.currentSettings&&window.currentSettings.adminPassword)||'1234'); if(pw===saved){sessionStorage.setItem('quizVideoAdminUnlocked','yes'); location.href='start-quiz.html';} else if(pw!==null){alert('비밀번호가 맞지 않습니다.');} };
</script></body></html>
