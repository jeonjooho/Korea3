<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><title>Quiz & Video Input</title>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;min-height:100%;font-family:Arial,sans-serif;background:linear-gradient(135deg,var(--input-bg,#eaf4ff),#ffffff);color:var(--input-text,#122044)}body{overflow:hidden;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}.screen{display:none;position:fixed;inset:0;width:100vw;height:100dvh;overflow:auto;background:linear-gradient(135deg,var(--input-bg,#eaf4ff),#ffffff)}.screen.active{display:block}.home{display:none;place-items:center;padding:28px}.home.active{display:grid}.homeCard{width:min(92vw,var(--home-card-width,720px));background:var(--home-card,#fff);border-radius:28px;padding:var(--home-card-padding,42px);transform:translate(var(--home-card-x,0px),var(--home-card-y,0px));box-shadow:0 12px 44px #7692b344;text-align:center}.homeTitle{font-size:var(--home-title-size,44px);line-height:1.1;margin:0 0 12px;color:var(--title-color,#0b4fd7)}.homeHint{font-size:var(--home-hint-size,20px);color:#51617f;margin:0 0 30px}.homeFull{position:fixed;right:22px;bottom:22px;z-index:50;box-shadow:0 8px 22px rgba(20,40,80,.25);display:none}.home.active .homeFull{display:block}.menuBtns{display:grid;grid-template-columns:1fr 1fr;gap:18px}.menuBtns.positioned{display:block;position:relative;width:100%;min-height:220px}.menuBtns.positioned .menuBtn{position:absolute;display:grid;place-items:center;padding:8px 12px}.menuBtns .quizBtn{grid-column:1 / -1}.videoBtn{background:var(--video-btn,#7c3aed);color:white}.videoBtn2{background:var(--video-btn2,#7c3aed);color:white}.idleBtn{position:fixed;display:none;place-items:center;z-index:45;background:var(--idle-btn,#0f766e);color:white}.home.active .idleBtn{display:grid}.menuBtn{font-size:var(--menu-button-size,28px);padding:34px 20px;border-radius:22px;box-shadow:0 8px 22px rgba(20,60,130,.18)}.quizBtn{background:var(--quiz-btn,#209147);color:white}.back{background:#e8eef8;color:#17335f}.quizWrap{max-width:760px;margin:0 auto;padding:28px;min-height:100dvh;display:flex;flex-direction:column;justify-content:center}.quizCard{background:var(--quiz-card,#fff);border-radius:28px;padding:34px;text-align:center;box-shadow:0 12px 44px #7692b344}.qrImg{width:min(72vw,var(--qr-size,430px));height:auto;border-radius:18px;box-shadow:0 8px 24px rgba(20,40,80,.18);margin:20px auto 10px;display:block}.quizTitle{font-size:var(--quiz-title-size,42px);margin:0;color:var(--title-color,#0b4fd7)}.quizText{font-size:var(--quiz-text-size,22px);color:#51617f;line-height:1.45}.topActions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}@media(max-width:720px){.homeTitle{font-size:calc(var(--home-title-size,44px) * .78)}.menuBtns{grid-template-columns:1fr}.menuBtns .quizBtn{grid-column:auto}.menuBtn{font-size:calc(var(--menu-button-size,28px) * .85)}.topActions{margin-top:10px;flex-wrap:wrap}}
.fullscreen{background:#17335f;color:white;white-space:nowrap;border:0;border-radius:14px;padding:16px 24px;font-size:18px;font-weight:800;cursor:pointer}
</style></head><body>
<section id="homeScreen" class="screen active home"><button class="fullscreen homeFull" id="homeFullscreen" type="button">Full Screen</button><button class="menuBtn idleBtn" id="goIdle" type="button">Back to Standby</button><div class="homeCard"><h1 class="homeTitle" id="homeTitleText">Quiz & Video Zone</h1><p class="homeHint" id="homeHintText">Please choose one option.</p><div class="menuBtns"><button class="menuBtn videoBtn" id="goVideo" type="button">Watch Video</button><button class="menuBtn videoBtn videoBtn2" id="goVideo2" type="button">Watch Video 2</button><button class="menuBtn quizBtn" id="goQuiz" type="button">Play Quiz</button></div></div></section>
<section id="quizScreen" class="screen"><div class="quizWrap"><div class="topActions"><button class="back" id="backHome2" type="button">Home</button></div><div class="quizCard"><h1 class="quizTitle" id="quizTitleText">Play Quiz</h1><p class="quizText" id="quizTextText">Scan this QR code to participate in the quiz.</p><img class="qrImg" id="quizQrImg" src="quiz_qr.png" alt="Quiz QR Code"></div></div></section>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="firebase-config-quiz.js"></script>
<script>
/* Quiz + Video input screen. Fully independent app: uses its OWN
   Firebase path "quizVideoBook/..." (settings + screenAction), separate
   from the message set's "visitorBook/...". */
(function(){
  const DEFAULT_SETTINGS={homeTitle:'Quiz & Video Zone',homeHint:'Please choose one option.',homeTitleSize:'44',homeHintSize:'20',homeCardColor:'#ffffff',homeCardX:'0',homeCardY:'0',homeCardWidth:'720',homeCardPadding:'42',inputBackgroundColor:'#eaf4ff',inputBackgroundImages:'',inputBackgroundInterval:'10',videoButtonX:'0',videoButtonY:'0',videoButtonWidth:'48',videoButtonHeight:'29',videoButton2X:'52',videoButton2Y:'0',videoButton2Width:'48',videoButton2Height:'29',quizButtonX:'0',quizButtonY:'36',quizButtonWidth:'100',quizButtonHeight:'29',idleButtonX:'55',idleButtonY:'91',idleButtonWidth:'20',idleButtonHeight:'7',inputTextColor:'#122044',quizButtonText:'Play Quiz',videoButtonText:'Watch Video',videoButton2Text:'Watch Video 2',idleButtonText:'Back to Standby',menuButtonFontSize:'28',quizButtonColor:'#209147',videoButtonColor:'#7c3aed',videoButton2Color:'#7c3aed',idleButtonColor:'#0f766e',videoBtnBorderColor:'#7c3aed',videoBtn2BorderColor:'#7c3aed',quizBtnBorderColor:'#209147',idleBtnBorderColor:'#0f766e',videoBtnTextColor:'#ffffff',videoBtn2TextColor:'#ffffff',quizBtnTextColor:'#ffffff',idleBtnTextColor:'#ffffff',quizTitle:'Play Quiz',quizText:'Scan this QR code to participate in the quiz.',quizTitleSize:'42',quizTextSize:'22',quizCardColor:'#ffffff',qrSize:'430',quizWebsiteUrl:'',quizQrImage:'',videoFileUrl:'',videoFileUrl2:'',videoTitle:'Watch Video',videoTitle2:'Watch Video 2',titleColor:'#0b4fd7'};
  function E(id){return document.getElementById(id);}
  function requireFirebase(){
    if(typeof firebase==='undefined'){console.error('Firebase SDK is not loaded.'); return null;}
    if(!window.db){console.error('Firebase is not initialized. Check firebase-config-quiz.js.'); return null;}
    return window.db;
  }
  const database=requireFirebase();
  if(!database){return;}
  const settingsRef=database.ref('quizVideoBook/settings');
  const actionRef=database.ref('quizVideoBook/screenAction');
  let inputBgTimer=null, inputBgIndex=0;

  function splitImageUrls(value){return String(value||'').split(/\n|,/).map(x=>x.trim()).filter(Boolean);}
  function safeCssUrl(url){url=String(url||'').trim();return url?'url(\"'+url.replace(/\"/g,'%22')+'\")':'none';}
  function bgStyle(color,image){image=String(image||'').trim();return image?((color||'')+' '+safeCssUrl(image)+' center/cover no-repeat'):(color||'');}
  function normalizeSettings(raw){
    const s={...DEFAULT_SETTINGS,...(raw||{})};
    return s;
  }
  function setInputBackground(s){
    const screens=document.querySelectorAll('.screen');
    const urls=splitImageUrls(s.inputBackgroundImages);
    if(inputBgTimer){clearInterval(inputBgTimer);inputBgTimer=null;}
    function applyOne(url){
      const base=url?`linear-gradient(rgba(255,255,255,.12),rgba(255,255,255,.12)), url("${url.replace(/"/g,'%22')}") center/cover no-repeat`:'';
      document.body.style.background=base||`linear-gradient(135deg,${s.inputBackgroundColor||'#eaf4ff'},#ffffff)`;
      screens.forEach(el=>{el.style.background=base||`linear-gradient(135deg,${s.inputBackgroundColor||'#eaf4ff'},#ffffff)`;});
    }
    if(urls.length){
      inputBgIndex=inputBgIndex%urls.length;
      applyOne(urls[inputBgIndex]);
      if(urls.length>1){inputBgTimer=setInterval(()=>{inputBgIndex=(inputBgIndex+1)%urls.length;applyOne(urls[inputBgIndex]);},Math.max(1,Number(s.inputBackgroundInterval||10))*1000);}
    }else applyOne('');
  }
  function setHomeButtonLayout(s){
    const area=document.querySelector('.menuBtns');
    if(!area)return;
    area.classList.add('positioned');
    area.style.height='300px'; // fixed reference height so X/Y/Width/Height percentages below are consistent
    const map=[['goVideo','videoButton'],['goVideo2','videoButton2'],['goQuiz','quizButton']];
    map.forEach(([id,key])=>{const el=E(id); if(!el)return; el.style.left=(s[key+'X']||0)+'%'; el.style.top=(s[key+'Y']||0)+'%'; el.style.width=(s[key+'Width']||48)+'%'; el.style.height=(s[key+'Height']||29)+'%';});
  }
  function setIdleButtonLayout(s){
    const el=E('goIdle');
    if(!el)return;
    // idleButtonX/Y/Width/Height are percent of the whole screen (position:fixed resolves % against the viewport)
    el.style.left=(s.idleButtonX??55)+'%';
    el.style.top=(s.idleButtonY??91)+'%';
    el.style.width=(s.idleButtonWidth??20)+'%';
    el.style.height=(s.idleButtonHeight??7)+'%';
  }

  function applySettings(s){
    s=normalizeSettings(s); const r=document.documentElement.style;
    r.setProperty('--title-color',s.titleColor); r.setProperty('--input-bg',s.inputBackgroundColor); r.setProperty('--input-text',s.inputTextColor); r.setProperty('--home-card',s.homeCardColor); r.setProperty('--home-card-x',(s.homeCardX||0)+'px'); r.setProperty('--home-card-y',(s.homeCardY||0)+'px'); r.setProperty('--home-card-width',(s.homeCardWidth||720)+'px'); r.setProperty('--home-card-padding',(s.homeCardPadding||42)+'px'); r.setProperty('--home-title-size',s.homeTitleSize+'px'); r.setProperty('--home-hint-size',s.homeHintSize+'px'); r.setProperty('--menu-button-size',s.menuButtonFontSize+'px'); r.setProperty('--quiz-btn',s.quizButtonColor); r.setProperty('--video-btn',s.videoButtonColor); r.setProperty('--video-btn2',s.videoButton2Color); r.setProperty('--idle-btn',s.idleButtonColor); r.setProperty('--quiz-card',s.quizCardColor); r.setProperty('--quiz-title-size',s.quizTitleSize+'px'); r.setProperty('--quiz-text-size',s.quizTextSize+'px'); r.setProperty('--qr-size',s.qrSize+'px');
    setInputBackground(s);setHomeButtonLayout(s);setIdleButtonLayout(s);
    const homeCard=document.querySelector('.homeCard'); if(homeCard){homeCard.style.background=bgStyle(s.homeCardColor,s.homeCardImage); if(s.homeCardHeight)homeCard.style.minHeight=Number(s.homeCardHeight)+'px';}
    [['goVideo','videoBtn'],['goVideo2','videoBtn2'],['goQuiz','quizBtn'],['goIdle','idleBtn']].forEach(([id,key])=>{const el=E(id); if(el){el.style.background=bgStyle(s[key+'Color']||'',s[key+'Image']||''); el.style.color=s[key+'TextColor']||'#fff'; el.style.border=`4px solid ${s[key+'BorderColor']||'transparent'}`; el.style.fontFamily=s[key+'Font']||'Arial'; el.style.fontSize=(s[key+'FontSize']||s.menuButtonFontSize||28)+'px';}});
    E('homeFullscreen').textContent='Full Screen';
    E('homeTitleText').textContent=s.homeTitle; E('homeHintText').textContent=s.homeHint; E('goQuiz').textContent=s.quizButtonText; E('goVideo').textContent=s.videoButtonText; E('goVideo2').textContent=s.videoButton2Text; E('goIdle').textContent=s.idleButtonText; E('quizTitleText').textContent=s.quizTitle; E('quizTextText').textContent=s.quizText; E('quizQrImg').src=s.quizQrImage||'quiz_qr.png';
    window.currentSettings=s;
  }

  settingsRef.on('value',snap=>{ if(snap.exists()) applySettings(snap.val()); else applySettings(DEFAULT_SETTINGS); },err=>console.error('Firebase settings read error:',err));

  function showScreen(id){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active')); E(id).classList.add('active');}
  function normalizeUrl(url){url=String(url||'').trim(); if(!url)return ''; if(!/^https?:\/\//i.test(url))url='https://'+url; return url;}
  function sendAction(action){return actionRef.set({...action,appFullScreen:true,createdAt:firebase.database.ServerValue.TIMESTAMP});}
  E('goVideo').onclick=()=>{const s=window.currentSettings||DEFAULT_SETTINGS; const url=(s.videoFileUrl||'').trim(); if(!url){alert('Please set the video file path in start-quiz.html first.');return;} sendAction({type:'open-video-window',url,title:s.videoTitle||'Watch Video',slot:'1'});};
  E('goVideo2').onclick=()=>{const s=window.currentSettings||DEFAULT_SETTINGS; const url=(s.videoFileUrl2||'').trim(); if(!url){alert('Please set the video 2 file path in start-quiz.html first.');return;} sendAction({type:'open-video-window',url,title:s.videoTitle2||'Watch Video 2',slot:'2'});};
  let lastQuizClickAt=0;
  E('goQuiz').onclick=()=>{const now=Date.now(); if(now-lastQuizClickAt<1500)return; lastQuizClickAt=now; const s=window.currentSettings||DEFAULT_SETTINGS; showScreen('quizScreen'); const url=normalizeUrl(s.quizWebsiteUrl); if(url){sendAction({type:'open-quiz-window',url});}};
  E('goIdle').onclick=()=>{sendAction({type:'go-idle'});};
  E('backHome2').onclick=()=>showScreen('homeScreen');

  const fullBtns=[E('homeFullscreen')].filter(Boolean); function updateFullButton(){fullBtns.forEach(btn=>btn.textContent=document.fullscreenElement?'Exit Full Screen':'Full Screen');} async function toggleFullscreen(){try{if(!document.fullscreenElement)await document.documentElement.requestFullscreen(); else await document.exitFullscreen();}catch(e){alert('이 브라우저에서는 Full Screen 모드를 사용할 수 없습니다.');}} fullBtns.forEach(btn=>btn.onclick=toggleFullscreen); document.addEventListener('fullscreenchange',updateFullButton); updateFullButton();
})();
</script></body></html>
