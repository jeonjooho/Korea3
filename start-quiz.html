<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Start / Admin — Quiz & Video</title>
<style>
*{box-sizing:border-box} body{margin:0;font-family:Arial,sans-serif;background:#eef6ff;color:#10234a}
.wrap{max-width:1180px;margin:0 auto;padding:28px}
.box{background:white;border-radius:24px;padding:28px;box-shadow:0 10px 40px #8aa8c955}
h1{margin:0;color:#0b4fd7} .note{color:#51617f}
.section{border-top:1px solid #d9e6f8;margin-top:22px;padding-top:22px}
.section h2{margin:0 0 4px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.full{grid-column:1/-1}
label{display:block;font-weight:800;font-size:13px;margin-bottom:5px}
input,select,textarea{width:100%;padding:10px;border:2px solid #c7d7ef;border-radius:10px;font-size:15px}
textarea{min-height:72px}
.bar{position:sticky;top:0;background:#ffffffee;z-index:5;padding:12px 0;display:flex;gap:10px;flex-wrap:wrap}
button,a.btn{border:0;border-radius:12px;padding:12px 18px;font-weight:900;background:#0b4fd7;color:white;text-decoration:none;cursor:pointer}
.light{background:#e8eef8;color:#17335f}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
body.locked main{display:none}
#adminLock{position:fixed;inset:0;z-index:99999;display:grid;place-items:center;background:#eef6ff}
body:not(.locked) #adminLock{display:none}
.lockBox{width:min(92vw,430px);background:white;border-radius:22px;padding:28px;box-shadow:0 16px 45px #48627a55}
.lockBox h2{margin:0 0 12px;color:#0b4fd7}
.lockBox input{margin:8px 0 12px}
.lockError{color:#b91c1c;font-weight:800;min-height:22px}
</style></head><body class="locked">
<div id="adminLock"><div class="lockBox"><h2>관리자 비밀번호</h2><p class="note">start-quiz 화면에 접속하려면 비밀번호를 입력하세요.</p><input id="adminPasswordInput" type="password" placeholder="비밀번호 입력"><button id="adminPasswordSubmit" type="button">접속</button><div id="adminPasswordError" class="lockError"></div></div></div>
<main class="wrap"><div class="box">
<h1>퀴즈 / 영상 관리자</h1>
<p class="note">이 화면은 독립된 "quizVideoBook/..." Firebase 경로를 사용합니다 (메시지 방명록과 별개). 초기 화면 / 입력 화면 / 스크린 표시 방식을 설정합니다.</p>
<div class="bar">
  <button id="saveBtn">설정 저장</button>
  <a class="btn light" href="index-quiz.html" target="_blank">초기 화면</a>
  <a class="btn light" href="input-quiz.html" target="_blank">입력 화면</a>
  <a class="btn light" href="screen-quiz.html" target="_blank">스크린 화면</a>
</div>
<div id="status"></div>

<section class="section"><h2>관리자 보안 설정</h2><div class="grid">
  <div><label>관리자 접속 비밀번호</label><input data-key="adminPassword" id="adminPassword" type="text" placeholder="기본값 1234"></div>
</div></section>

<section class="section"><h2>초기 화면 설정 (index-quiz.html)</h2><div class="grid">
  <div><label>제목</label><input data-key="indexTitle" type="text"></div>
  <div><label>제목 크기</label><input data-key="indexTitleSize" type="number"></div>
  <div><label>제목 색상</label><input data-key="indexTitleColor" type="color"></div>
  <div class="full"><label>부제목</label><input data-key="indexSubtitle" type="text"></div>
  <div><label>배경색</label><input data-key="indexBgColor" type="color"></div>
  <div><label>박스 색상</label><input data-key="indexBoxColor" type="color"></div>
  <div><label>박스 가로(px)</label><input data-key="indexBoxWidth" type="number"></div>
</div></section>

<section class="section"><h2>입력 화면 — 홈 설정</h2><div class="grid">
  <div><label>홈 제목</label><input data-key="homeTitle" type="text"></div>
  <div><label>홈 안내문구</label><input data-key="homeHint" type="text"></div>
  <div><label>입력 화면 배경색</label><input data-key="inputBackgroundColor" type="color"></div>
  <div class="full"><label>입력 화면 배경 이미지 URL (여러 개는 줄바꿈/쉼표 구분, 자동 순환)</label><textarea data-key="inputBackgroundImages"></textarea></div>
  <div><label>"Watch Video" 버튼 문구</label><input data-key="videoButtonText" type="text"></div>
  <div><label>버튼 색상</label><input data-key="videoButtonColor" type="color"></div>
  <div><label>버튼 테두리 색상</label><input data-key="videoBtnBorderColor" type="color"></div>
  <div><label>버튼 제목 색상</label><input data-key="videoBtnTextColor" type="color"></div>
  <div><label>"Watch Video 2" 버튼 문구</label><input data-key="videoButton2Text" type="text"></div>
  <div><label>버튼 색상</label><input data-key="videoButton2Color" type="color"></div>
  <div><label>버튼 테두리 색상</label><input data-key="videoBtn2BorderColor" type="color"></div>
  <div><label>버튼 제목 색상</label><input data-key="videoBtn2TextColor" type="color"></div>
  <div><label>"Play Quiz" 버튼 문구</label><input data-key="quizButtonText" type="text"></div>
  <div><label>버튼 색상</label><input data-key="quizButtonColor" type="color"></div>
  <div><label>버튼 테두리 색상</label><input data-key="quizBtnBorderColor" type="color"></div>
  <div><label>버튼 제목 색상</label><input data-key="quizBtnTextColor" type="color"></div>
</div></section>

<section class="section"><h2>영상 설정</h2><div class="grid">
  <div class="full"><label>영상 1 URL (유튜브/Vimeo 링크, 직접 mp4 링크, 또는 스크린 화면에서 선택한 로컬 파일을 쓰려면 "LOCAL")</label><input data-key="videoFileUrl" type="text" placeholder="https://... 또는 LOCAL"></div>
  <div><label>영상 1 제목</label><input data-key="videoTitle" type="text"></div>
  <div><label>영상 1 자동재생 사용</label><select data-key="videoAutoplayEnabled"><option value="no">No</option><option value="yes">Yes</option></select></div>
  <div><label>영상 1 자동재생 주기(분)</label><input data-key="videoAutoplayIntervalMin" type="number"></div>
  <div><label>영상 1 로컬 선택기 스크린에 표시</label><select data-key="localVideoEnabled"><option value="yes">Yes</option><option value="no">No</option></select></div>
  <div class="full"><label>영상 2 URL</label><input data-key="videoFileUrl2" type="text" placeholder="https://... 또는 LOCAL"></div>
  <div><label>영상 2 제목</label><input data-key="videoTitle2" type="text"></div>
  <div><label>영상 2 자동재생 사용</label><select data-key="video2AutoplayEnabled"><option value="no">No</option><option value="yes">Yes</option></select></div>
  <div><label>영상 2 자동재생 주기(분)</label><input data-key="video2AutoplayIntervalMin" type="number"></div>
  <div><label>영상 2 로컬 선택기 스크린에 표시</label><select data-key="localVideoEnabled2"><option value="yes">Yes</option><option value="no">No</option></select></div>
  <div><label>1→2 순차 자동재생 사용</label><select data-key="videoSequentialAutoplayEnabled"><option value="no">No</option><option value="yes">Yes</option></select></div>
  <div><label>순차 자동재생 주기(분)</label><input data-key="videoSequentialAutoplayIntervalMin" type="number"></div>
  <div><label>영상 페이드인(초)</label><input data-key="videoFadeInDuration" type="number" step="0.1"></div>
  <div><label>영상 페이드아웃(초)</label><input data-key="videoFadeOutDuration" type="number" step="0.1"></div>
</div></section>

<section class="section"><h2>퀴즈 설정</h2><div class="grid">
  <div><label>퀴즈 화면 제목</label><input data-key="quizTitle" type="text"></div>
  <div class="full"><label>퀴즈 화면 안내문구</label><input data-key="quizText" type="text"></div>
  <div class="full"><label>퀴즈 QR 이미지 URL</label><input data-key="quizQrImage" type="text"></div>
  <div class="full"><label>퀴즈 웹사이트 URL (스크린에서 팝업으로 열림)</label><input data-key="quizWebsiteUrl" type="text"></div>
</div></section>

<section class="section"><h2>스크린 화면 설정 (대기 화면)</h2><div class="grid">
  <div class="full"><label>스크린 대기 제목</label><input data-key="screenTitle" type="text"></div>
  <div><label>제목 크기(px)</label><input data-key="screenTitleSize" type="number"></div>
  <div><label>제목 색상</label><input data-key="screenTitleColor" type="color"></div>
  <div></div>
  <div><label>제목 가로 위치 (%)</label><input data-key="screenTitleAreaX" type="number" step="0.1"></div>
  <div><label>제목 세로 위치 (%)</label><input data-key="screenTitleAreaY" type="number" step="0.1"></div>
  <div><label>제목 가로 크기 (%)</label><input data-key="screenTitleAreaWidth" type="number" step="0.1"></div>
  <div><label>제목 세로 크기 (%)</label><input data-key="screenTitleAreaHeight" type="number" step="0.1"></div>
  <div class="full"><label>스크린 부제목</label><input data-key="screenSubtitle" type="text"></div>
  <div><label>부제목 크기(px)</label><input data-key="screenSubtitleSize" type="number"></div>
  <div><label>부제목 색상</label><input data-key="screenSubtitleColor" type="color"></div>
  <div></div>
  <div><label>부제목 가로 위치 (%)</label><input data-key="screenSubtitleAreaX" type="number" step="0.1"></div>
  <div><label>부제목 세로 위치 (%)</label><input data-key="screenSubtitleAreaY" type="number" step="0.1"></div>
  <div><label>부제목 가로 크기 (%)</label><input data-key="screenSubtitleAreaWidth" type="number" step="0.1"></div>
  <div><label>부제목 세로 크기 (%)</label><input data-key="screenSubtitleAreaHeight" type="number" step="0.1"></div>
  <div><label>배경색</label><input data-key="screenBgColor" type="color"></div>
  <div class="full"><label>배경 이미지 URL (여러 개는 줄바꿈으로 구분, 자동 순환)</label><textarea data-key="screenBgImages"></textarea></div>
  <div class="full">
    <label>배경 이미지 로컬 업로드 (최대 5개 — 선택하면 자동으로 위 목록에 추가됩니다)</label>
    <input id="screenBgUpload" type="file" accept="image/*" multiple>
    <div id="screenBgUploadPreview" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px"></div>
  </div>
  <div><label>배경 전환 주기(초)</label><input data-key="screenBgInterval" type="number"></div>
</div></section>

</div></main>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="firebase-config-quiz.js"></script>
<script>
if(typeof db==='undefined'){document.body.insertAdjacentHTML('afterbegin','<div style="position:fixed;inset:0;z-index:9999;background:white;color:#b91c1c;padding:30px;font:20px Arial">Firebase is not initialized. Please check firebase-config-quiz.js.</div>'); throw new Error('Firebase db is not defined');}
const settingsRef=db.ref('quizVideoBook/settings');
let currentSettings={};

function status(msg,ok){const d=document.getElementById('status'); d.style.color=ok?'#11803a':'#b91c1c'; d.textContent=msg;}

function fillForm(s){
  currentSettings=s||{};
  document.querySelectorAll('[data-key]').forEach(elm=>{
    const key=elm.getAttribute('data-key');
    const v=currentSettings[key];
    if(v!==undefined && v!==null) elm.value=v;
  });
}
function collectForm(){
  const out={...currentSettings};
  document.querySelectorAll('[data-key]').forEach(elm=>{
    const key=elm.getAttribute('data-key');
    out[key]=elm.value;
  });
  return out;
}
settingsRef.on('value',snap=>{ fillForm(snap.val()||{}); checkLock(); renderBgUploadPreview(); });

const MAX_BG_UPLOADS=5;
function resizeImageFile(file,maxDim,quality){
  maxDim=maxDim||1600; quality=quality||0.82;
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>maxDim||h>maxDim){ const scale=maxDim/Math.max(w,h); w=Math.round(w*scale); h=Math.round(h*scale); }
        const canvas=document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        try{ resolve(canvas.toDataURL('image/jpeg',quality)); }catch(e){ reject(e); }
      };
      img.onerror=()=>reject(new Error('이미지를 불러올 수 없습니다.'));
      img.src=reader.result;
    };
    reader.onerror=()=>reject(new Error('파일을 읽을 수 없습니다.'));
    reader.readAsDataURL(file);
  });
}
function getBgTextarea(){ return document.querySelector('[data-key="screenBgImages"]'); }
function currentBgList(){ return String(getBgTextarea().value||'').split('\n').map(x=>x.trim()).filter(Boolean); }
function renderBgUploadPreview(){
  const preview=document.getElementById('screenBgUploadPreview');
  if(!preview) return;
  preview.innerHTML='';
  currentBgList().forEach((url,idx)=>{
    const wrap=document.createElement('div');
    wrap.style.cssText='position:relative';
    const im=document.createElement('img');
    im.src=url; im.style.cssText='width:70px;height:50px;object-fit:cover;border-radius:8px;border:1px solid #c7d7ef;display:block';
    const del=document.createElement('button');
    del.type='button'; del.textContent='×';
    del.style.cssText='position:absolute;top:-8px;right:-8px;width:20px;height:20px;padding:0;line-height:18px;font-size:14px;border-radius:50%;background:#b91c1c;color:#fff;font-weight:900;cursor:pointer';
    del.onclick=()=>{ const list=currentBgList(); list.splice(idx,1); getBgTextarea().value=list.join('\n'); renderBgUploadPreview(); };
    wrap.appendChild(im); wrap.appendChild(del); preview.appendChild(wrap);
  });
}
const bgUploadInput=document.getElementById('screenBgUpload');
if(bgUploadInput){
  bgUploadInput.addEventListener('change', async (e)=>{
    const existing=currentBgList();
    const room=MAX_BG_UPLOADS-existing.length;
    const files=Array.from(e.target.files||[]);
    if(room<=0){ status('배경 이미지는 최대 '+MAX_BG_UPLOADS+'개까지 등록할 수 있습니다. 먼저 일부를 삭제하세요.',false); e.target.value=''; return; }
    const toProcess=files.slice(0,room);
    if(files.length>room){ status('최대 '+MAX_BG_UPLOADS+'개까지만 등록되어 일부 이미지는 제외되었습니다.',false); }
    try{
      for(const f of toProcess){
        const dataUrl=await resizeImageFile(f);
        existing.push(dataUrl);
      }
      getBgTextarea().value=existing.join('\n');
      renderBgUploadPreview();
      if(files.length<=room) status('이미지가 추가되었습니다. "설정 저장" 버튼을 눌러 저장하세요.',true);
    }catch(err){
      status('이미지 처리 중 오류: '+(err&&err.message?err.message:err),false);
    }
    e.target.value='';
  });
}

document.getElementById('saveBtn').onclick=async()=>{
  try{
    const data=collectForm();
    await settingsRef.set(data);
    status('설정이 저장되었습니다.',true);
  }catch(e){status('저장 오류: '+(e&&e.message?e.message:e),false);}
};

function checkLock(){
  if(sessionStorage.getItem('quizVideoAdminUnlocked')==='yes'){ document.body.classList.remove('locked'); return; }
}
document.getElementById('adminPasswordSubmit').onclick=()=>{
  const pw=document.getElementById('adminPasswordInput').value;
  const saved=String(currentSettings.adminPassword||'1234');
  if(pw===saved){ sessionStorage.setItem('quizVideoAdminUnlocked','yes'); document.body.classList.remove('locked'); }
  else{ document.getElementById('adminPasswordError').textContent='비밀번호가 맞지 않습니다.'; }
};
</script>
</body></html>
